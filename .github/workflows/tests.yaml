name: Tests

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare yarn@4.12.0 --activate
        yarn --version

    - uses: calcit-lang/setup-cr@0.0.9

    - name: Install deps
      run: caps --ci && yarn install --immutable

    - name: "test cr"
      run: cr --entry test -1

    - name: "test js"
      run: cr --entry test js -1 && node test.mjs
